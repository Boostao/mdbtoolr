<h2>mdbtoolr: DBI Interface to mdbtools</h2>

<h3>Description</h3>

<p>The <span class="pkg">mdbtoolr</span> package provides a <span class="pkg">DBI</span> backend that reads
Microsoft Access <code>.mdb</code> and <code>.accdb</code> files through
external <code>mdbtools</code> commands.
</p>
